<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Tax Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:#0A0A0A;--accent:#C8102E;--accent-light:#FFF0F2;--surface:#FFFFFF;
    --surface-2:#F5F4F0;--surface-3:#EDECEA;--ink:#0A0A0A;--ink-secondary:#5A5A5A;
    --ink-muted:#9A9A9A;--border:rgba(0,0,0,0.10);--border-strong:rgba(0,0,0,0.22);
    --success:#1A7A4A;--success-bg:#EBF8F1;--info:#1E5FA8;--warning:#A06B00;
    --font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--surface-2);color:var(--ink);min-height:100vh;}
  .masthead{background:var(--primary);padding:20px 24px 18px;display:flex;align-items:center;justify-content:center;text-align:center;border-bottom:3px solid var(--accent);}
  .masthead-wordmark{font-family:var(--font-display);font-size:32px;color:#fff;letter-spacing:1.5px;line-height:1;}
  .masthead-wordmark span{color:var(--accent);}
  .masthead-sub{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:2px;padding-bottom:3px;}

  /* PANELS */
  .section-row{display:flex;gap:12px;padding:16px 16px 0;flex-wrap:wrap;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;flex:1;min-width:280px;}
  .panel-header{font-family:var(--font-mono);font-weight:500;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-muted);padding:10px 14px 9px;border-bottom:1px solid var(--border);background:var(--surface-2);}
  .panel table{border-collapse:collapse;width:100%;}
  .panel th{font-family:var(--font-mono);font-weight:500;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-muted);padding:7px 10px 6px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border);background:var(--surface-2);}
  .panel th:first-child{text-align:left;}
  .panel td{font-family:var(--font-mono);font-size:11px;padding:6px 10px;text-align:right;white-space:nowrap;color:var(--ink-secondary);border-bottom:1px solid rgba(0,0,0,0.05);}
  .panel td:first-child{font-family:var(--font-body);font-weight:500;font-size:12px;text-align:left;color:var(--ink);}
  .panel-overflow{overflow-x:auto;}

  /* CONTROLS */
  .controls{display:flex;justify-content:flex-start;gap:8px;padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);}
  .controls button{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;border:1px solid var(--border-strong);background:var(--surface);color:var(--ink-secondary);border-radius:3px;cursor:pointer;transition:all .15s;}
  .controls button:hover{background:var(--primary);color:#fff;border-color:var(--primary);}

  /* LOADING */
  .loading{display:flex;flex-direction:column;align-items:center;padding:80px 20px;gap:14px;}
  .spinner{width:32px;height:32px;border:3px solid var(--surface-3);border-top:3px solid var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-muted);}

  /* MAIN TABLE */
  .table-wrapper{overflow-x:auto;padding:10px 16px 50px;}
  table.main{border-collapse:collapse;width:100%;}
  table.main thead th{position:sticky;top:0;z-index:15;background:var(--primary);font-family:var(--font-mono);font-weight:500;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.55);padding:12px 10px 10px;text-align:right;white-space:nowrap;border-bottom:2px solid var(--accent);user-select:none;cursor:pointer;transition:color .15s;}
  table.main thead th:hover{color:#fff;}
  table.main thead th.sort-active{color:#fff;}
  table.main thead th .sort-arrow{font-size:8px;margin-left:3px;opacity:.3;}
  table.main thead th.sort-active .sort-arrow{opacity:1;color:var(--accent);}
  table.main thead th:first-child{text-align:left;padding-left:20px;min-width:200px;position:sticky;left:0;z-index:25;background:var(--primary);}
  table.main thead th.total-col{color:#fff;border-left:2px solid rgba(255,255,255,0.15);}
  table.main tbody td:first-child{position:sticky;left:0;z-index:10;}
  table.main tbody tr.team-row{border-bottom:1px solid var(--border);background:var(--surface);cursor:pointer;transition:background .1s;}
  table.main tbody tr.team-row:hover{background:var(--surface-2);}
  table.main tbody tr.team-row td{padding:12px 10px;text-align:right;font-family:var(--font-mono);font-size:12px;font-weight:600;white-space:nowrap;}
  table.main tbody tr.team-row td:first-child{font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--ink);text-align:left;padding-left:20px;background:inherit;}
  table.main tbody tr.team-row:hover td:first-child{background:var(--surface-2);}
  .team-name-cell{display:flex;align-items:center;gap:8px;}
  .team-logo{width:22px;height:22px;object-fit:contain;flex-shrink:0;}
  .caret{display:inline-block;font-size:8px;color:var(--ink-muted);transition:transform .2s,color .15s;flex-shrink:0;}
  tr.team-row.expanded .caret{transform:rotate(90deg);color:var(--accent);}
  tr.team-row.expanded td:first-child{color:var(--accent);}
  table.main tbody tr.year-row{display:none;border-bottom:1px solid rgba(0,0,0,0.05);background:var(--surface-2);transition:background .1s;}
  table.main tbody tr.year-row.show{display:table-row;}
  table.main tbody tr.year-row:hover{background:var(--surface-3);}
  table.main tbody tr.year-row td{padding:8px 10px;text-align:right;font-family:var(--font-mono);font-size:11px;font-weight:400;white-space:nowrap;color:var(--ink-secondary);}
  table.main tbody tr.year-row td:first-child{font-family:var(--font-body);font-weight:400;font-size:12px;color:var(--ink-muted);text-align:left;padding-left:44px;background:inherit;}
  table.main tbody tr.year-row:hover td:first-child{background:var(--surface-3);}
  td.total-cell{border-left:2px solid rgba(0,0,0,0.12);font-weight:700!important;}
  .repeater-badge{font-family:var(--font-mono);font-size:8px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--accent);background:var(--accent-light);border:1px solid rgba(200,16,46,0.2);padding:1px 6px;border-radius:3px;display:inline-block;}
  .amt-high{color:var(--accent);}.amt-mid{color:var(--warning);}.amt-low{color:var(--info);}.amt-zero{color:var(--ink-muted);}.amt-green{color:var(--success);}
  @media(max-width:900px){.section-row{flex-direction:column;}.masthead-wordmark{font-size:22px;}}
  ::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:var(--surface-2);}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px;}
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-wordmark">LUXURY TAX <span>TRACKER</span></div>
  
</div>

<div id="panels"></div>

<div class="controls">
  <button onclick="collapseAll()">By Team</button>
  <button onclick="expandAll()">By Team and Year</button>
</div>

<div id="app">
  <div class="loading"><div class="spinner"></div><p>Loading&hellip;</p></div>
</div>

<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRTwTOS_rNBYI8d8zDUivGFWXsXcxlOZgrqn5o-WCvFC5aNAR3vLsSqllE7aO0BRw/pub?gid=1262804733&single=true&output=csv';
const FALLBACK_B64='LCwyMDI1LzIwMjYgQnJhY2tldHM=';

const nbaIds={ATL:1610612737,BOS:1610612738,BKN:1610612751,CHO:1610612766,CHI:1610612741,CLE:1610612739,DAL:1610612742,DEN:1610612743,DET:1610612765,GSW:1610612744,HOU:1610612745,IND:1610612754,LAC:1610612746,LAL:1610612747,MEM:1610612763,MIA:1610612748,MIL:1610612749,MIN:1610612750,NOP:1610612740,NYK:1610612752,OKC:1610612760,ORL:1610612753,PHI:1610612755,PHX:1610612756,POR:1610612757,SAC:1610612758,SAS:1610612759,TOR:1610612761,UTA:1610612762,WAS:1610612764};
const teamAbbrMap={'Atlanta Hawks':'ATL','Boston Celtics':'BOS','Brooklyn Nets':'BKN','Charlotte Hornets':'CHO','Chicago Bulls':'CHI','Cleveland Cavaliers':'CLE','Dallas Mavericks':'DAL','Denver Nuggets':'DEN','Detroit Pistons':'DET','Golden State Warriors':'GSW','Houston Rockets':'HOU','Indiana Pacers':'IND','Los Angeles Clippers':'LAC','Los Angeles Lakers':'LAL','Memphis Grizzlies':'MEM','Miami Heat':'MIA','Milwaukee Bucks':'MIL','Minnesota Timberwolves':'MIN','New Orleans Pelicans':'NOP','New York Knicks':'NYK','Oklahoma City Thunder':'OKC','Orlando Magic':'ORL','Philadelphia 76ers':'PHI','Phoenix Suns':'PHX','Portland Trail Blazers':'POR','Sacramento Kings':'SAC','San Antonio Spurs':'SAS','Toronto Raptors':'TOR','Utah Jazz':'UTA','Washington Wizards':'WAS'};
function logoUrl(team){const code=teamAbbrMap[team];const id=nbaIds[code];return id?`https://cdn.nba.com/logos/nba/${id}/primary/L/logo.svg`:'';}

let allTeamData={},bracketData=[],leagueTotals=[],sortedTeams=[],expandedSet=new Set();
function escKey(s){return s.replace(/[^a-z0-9]/gi,'_');}
function parseMoney(s){if(!s||!s.trim()||s.trim()==='-'||s.includes('$ -'))return 0;let c=s.replace(/[$,"\s]/g,'');if(c.startsWith('(')&&c.endsWith(')'))c='-'+c.slice(1,-1);const n=parseFloat(c);return isNaN(n)?0:n;}
function formatMoney(n,forceSign=false){if(n===0)return'—';const sign=n<0?'':'';const abs=Math.abs(n);const fmt='$'+abs.toLocaleString('en-US',{maximumFractionDigits:0});return n<0?`(${fmt})`:fmt;}
function amtClass(n){if(n===0)return'amt-zero';if(n<0)return'amt-green';if(n>=50000000)return'amt-high';if(n>=10000000)return'amt-mid';return'amt-low';}

function parseData(csv){
  const lines=csv.trim().split('\n');
  function parseLine(line){const vals=[];let cur='',inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=ch;}vals.push(cur.trim());return vals;}

  // Extract bracket data and league totals from early rows
  bracketData=[];leagueTotals=[];
  const years=['2025/2026','2026/2027','2027/2028','2028/2029','2029/2030'];
  const brackets=['$0–$5M','$5M–$10M','$10M–$15M','$15M–$20M','$20M–$25M','$25M–$30M','$30M–$35M','$35M–$40M','$40M–$45M','$45M–$50M','$50M+'];

  years.forEach((yr,i)=>{
    if(lines[i]){
      const vals=parseLine(lines[i]);
      const limits=vals.slice(2,13).map(v=>parseMoney(v));
      bracketData.push({year:yr,limits});
    }
    // League totals rows offset
    if(lines[i+5]){
      const vals=parseLine(lines[i+5]);
      const total=parseMoney(vals[1]||'');const nonTax=parseInt(vals[2])||0;const perTeam=parseMoney(vals[3]||'');
      if(total!==0)leagueTotals.push({year:yr,total,nonTax,perTeam});
    }
  });

  // Parse team data from remaining rows
  allTeamData={};
  for(let i=0;i<lines.length;i++){
    const vals=parseLine(lines[i]);
    if(!vals[0]||vals[0].trim()===''||vals[0].includes('Brackets')||vals[0].includes('Totals')||vals[0].includes('Year'))continue;
    const team=vals[0].trim();
    if(!teamAbbrMap[team]&&team.length>3)continue;// skip non-team rows
    if(!allTeamData[team])allTeamData[team]=[];
    // Each team has 5 rows (one per year)
    const yr=vals[1]||'';
    const taxSpace=parseMoney(vals[2]||'');
    const repeater=vals[3]||'';
    const taxAmts=vals.slice(4,15).map(v=>parseMoney(v));
    const total=parseMoney(vals[15]||'');
    allTeamData[team].push({yr,taxSpace,repeater,taxAmts,total});
  }
  sortedTeams=Object.keys(allTeamData).sort();
}

function renderPanels(){
  if(!bracketData.length&&!leagueTotals.length){document.getElementById('panels').innerHTML='';return;}
  let html='<div class="section-row">';

  if(bracketData.length){
    html+=`<div class="panel"><div class="panel-header">Tax Bracket Reference</div><div class="panel-overflow"><table><thead><tr>
      <th>Year</th><th>Tier 1</th><th>Tier 2</th><th>Tier 3</th><th>Tier 4</th><th>Tier 5</th>
    </tr></thead><tbody>`;
    bracketData.forEach(b=>{
      const cells=b.limits.slice(0,5).map(l=>l?`<td>$${(l/1e6).toFixed(2)}M</td>`:'<td>—</td>').join('');
      html+=`<tr><td>${b.year}</td>${cells}</tr>`;
    });
    html+='</tbody></table></div></div>';
  }

  if(leagueTotals.length){
    html+=`<div class="panel"><div class="panel-header">League Tax Totals</div><div class="panel-overflow"><table><thead><tr>
      <th>Year</th><th>Total Tax</th><th>Non-Tax Teams</th><th>Per Team</th>
    </tr></thead><tbody>`;
    leagueTotals.forEach(lt=>{
      html+=`<tr><td>${lt.year}</td><td>${formatMoney(lt.total)}</td><td>${lt.nonTax}</td><td>${formatMoney(lt.perTeam)}</td></tr>`;
    });
    html+='</tbody></table></div></div>';
  }

  html+='</div>';
  document.getElementById('panels').innerHTML=html;
}

function renderMainTable(){
  if(!sortedTeams.length){document.getElementById('app').innerHTML='<div style="text-align:center;padding:60px;color:var(--ink-muted)">No team data found</div>';return;}
  const years=['25/26','26/27','27/28','28/29','29/30'];
  const yearCols=years.map((y,i)=>`<th onclick="sortByYear(${i})">${y}<span class="sort-arrow">⇅</span></th>`).join('');
  let html=`<div class="table-wrapper"><table class="main"><thead><tr>
    <th style="text-align:left">Team<span class="sort-arrow">⇅</span></th>
    <th>Tax Space<span class="sort-arrow">⇅</span></th>
    <th>Repeater</th>
    ${yearCols}
    <th class="total-col">Total Tax<span class="sort-arrow">⇅</span></th>
  </tr></thead><tbody>`;

  sortedTeams.forEach(team=>{
    const key=escKey(team);
    const years_data=allTeamData[team]||[];
    const first=years_data[0]||{};
    const logo=logoUrl(team);
    const yearSummaries=years_data.map(y=>`<td class="${amtClass(y.total)}">${formatMoney(y.total)}</td>`).join('');
    const grandTotal=years_data.reduce((s,y)=>s+y.total,0);
    const taxSpaceFirst=first.taxSpace||0;
    const isRepeater=(years_data.some(y=>y.repeater&&y.repeater.toLowerCase().includes('yes')));
    html+=`<tr class="team-row" data-team="${key}" onclick="toggleTeam('${key}')">
      <td><div class="team-name-cell">
        <span class="caret">▶</span>
        ${logo?`<img src="${logo}" alt="${team}" class="team-logo">`:''}
        ${team}
      </div></td>
      <td class="${amtClass(taxSpaceFirst)}">${formatMoney(taxSpaceFirst)}</td>
      <td>${isRepeater?'<span class="repeater-badge">Repeater</span>':'—'}</td>
      ${yearSummaries}
      <td class="total-cell ${amtClass(grandTotal)}">${formatMoney(grandTotal)}</td>
    </tr>`;
    years_data.forEach(y=>{
      const bracketCells=y.taxAmts.slice(0,5).map(a=>`<td class="${a?'amt-high':'amt-zero'}">${formatMoney(a)}</td>`).join('');
      html+=`<tr class="year-row" data-team="${key}">
        <td>${y.yr||''}</td>
        <td class="${amtClass(y.taxSpace)}">${formatMoney(y.taxSpace)}</td>
        <td>${y.repeater&&y.repeater.toLowerCase().includes('yes')?'<span class="repeater-badge">Repeater</span>':'—'}</td>
        ${bracketCells}
        <td class="total-cell ${amtClass(y.total)}">${formatMoney(y.total)}</td>
      </tr>`;
    });
  });
  html+='</tbody></table></div>';
  document.getElementById('app').innerHTML=html;
  updateVisibility();
}

function toggleTeam(key){expandedSet.has(key)?expandedSet.delete(key):expandedSet.add(key);updateVisibility();}
function expandAll(){sortedTeams.forEach(t=>expandedSet.add(escKey(t)));updateVisibility();}
function collapseAll(){expandedSet.clear();updateVisibility();}
function updateVisibility(){
  document.querySelectorAll('tr.year-row').forEach(el=>el.classList.toggle('show',expandedSet.has(el.dataset.team)));
  document.querySelectorAll('tr.team-row').forEach(tr=>tr.classList.toggle('expanded',expandedSet.has(tr.dataset.team)));
}
function sortByYear(i){sortedTeams.sort((a,b)=>{const ad=allTeamData[a];const bd=allTeamData[b];return(bd[i]?.total||0)-(ad[i]?.total||0);});renderMainTable();}

async function init(){
  try{
    const resp=await fetch(CSV_URL);
    if(!resp.ok)throw new Error();
    parseData(await resp.text());
  }catch(e){
    try{parseData(atob(FALLBACK_B64));}catch(e2){document.getElementById('app').innerHTML='<div style="text-align:center;padding:80px;color:var(--accent)">Failed to load data.</div>';return;}
  }
  renderPanels();renderMainTable();
}
init();
</script>
</body>
</html>
