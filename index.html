<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Tax Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #06090f;
    --bg-primary: #0b1120;
    --bg-card: #111a2e;
    --bg-row-hover: #162040;
    --bg-expanded: #0d1424;
    --bg-expanded-hover: #142038;
    --border: #1c2a48;
    --border-light: #243356;
    --text-bright: #edf2fc;
    --text-primary: #c5cfdf;
    --text-secondary: #7b8ba8;
    --text-muted: #4a5a78;
    --accent-gold: #f0b840;
    --accent-cyan: #38bdf8;
    --accent-red: #ef6461;
    --accent-orange: #f59e0b;
    --accent-green: #34d399;
    --high: #ef6461;
    --mid: #f0b840;
    --low: #4a90e2;
    --zero: #3a4a68;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  .page-header {
    padding: 44px 32px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, #0e1a35 0%, var(--bg-deep) 100%);
    border-bottom: 1px solid var(--border);
  }

  .page-header::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(240,184,64,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .page-header h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 2.8rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--text-bright);
    position: relative;
  }

  .page-header h1 span {
    background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* SECTION PANELS */
  .section-row {
    display: flex;
    gap: 16px;
    padding: 20px 16px 0;
    flex-wrap: wrap;
  }

  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    flex: 1;
    min-width: 300px;
  }

  .panel-header {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 0.72rem;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--accent-gold);
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: rgba(240,184,64,0.03);
  }

  .panel table {
    border-collapse: collapse;
    width: 100%;
  }

  .panel th {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 0.65rem;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 8px 10px 7px;
    text-align: right;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg-primary);
  }

  .panel th:first-child { text-align: left; }

  .panel td {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    padding: 6px 10px;
    text-align: right;
    white-space: nowrap;
    color: var(--text-secondary);
    border-bottom: 1px solid rgba(28,42,72,0.3);
  }

  .panel td:first-child {
    font-family: 'Barlow', sans-serif;
    font-weight: 500;
    font-size: 0.72rem;
    text-align: left;
    color: var(--text-primary);
  }

  .panel-overflow { overflow-x: auto; }

  /* CONTROLS */
  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 20px 32px 6px;
    flex-wrap: wrap;
  }

  .controls button {
    font-family: 'Oswald', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    padding: 7px 20px;
    border: 1px solid var(--border-light);
    background: var(--bg-card);
    color: var(--text-secondary);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .controls button:hover {
    background: var(--accent-gold);
    color: var(--bg-deep);
    border-color: var(--accent-gold);
  }

  /* MAIN TABLE */
  .table-wrapper {
    overflow-x: auto;
    padding: 10px 16px 50px;
  }

  table.main {
    border-collapse: collapse;
    width: 100%;
  }

  table.main thead th {
    position: sticky;
    top: 0;
    z-index: 15;
    background: var(--bg-primary);
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 0.68rem;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-secondary);
    padding: 12px 10px 10px;
    text-align: right;
    white-space: nowrap;
    border-bottom: 2px solid var(--accent-gold);
    user-select: none;
    cursor: pointer;
    transition: color 0.2s;
  }

  table.main thead th:hover { color: var(--accent-cyan); }
  table.main thead th.sort-active { color: var(--accent-gold); }

  table.main thead th .sort-arrow {
    font-size: 0.5rem;
    margin-left: 3px;
    opacity: 0.3;
  }

  table.main thead th.sort-active .sort-arrow { opacity: 1; color: var(--accent-gold); }

  table.main thead th:first-child {
    text-align: left;
    padding-left: 20px;
    min-width: 200px;
    position: sticky;
    left: 0;
    z-index: 25;
    background: var(--bg-primary);
  }

  table.main thead th:nth-child(2),
  table.main thead th:nth-child(3) { min-width: 100px; }

  table.main thead th.total-col {
    color: var(--text-bright);
    border-left: 2px solid var(--border-light);
  }

  /* Sticky first column */
  table.main tbody td:first-child {
    position: sticky;
    left: 0;
    z-index: 10;
  }

  /* TEAM SUMMARY ROW (first year) */
  table.main tbody tr.team-row {
    border-bottom: 1px solid var(--border);
    background: var(--bg-deep);
    cursor: pointer;
    transition: background 0.12s;
  }

  table.main tbody tr.team-row:hover { background: var(--bg-row-hover); }

  table.main tbody tr.team-row td {
    padding: 12px 10px;
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    font-weight: 600;
    white-space: nowrap;
  }

  table.main tbody tr.team-row td:first-child {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.8px;
    color: var(--text-primary);
    text-align: left;
    padding-left: 20px;
    background: inherit;
  }

  table.main tbody tr.team-row:hover td:first-child { background: var(--bg-row-hover); }

  .team-name-cell {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .caret {
    display: inline-block;
    font-size: 0.5rem;
    color: var(--text-muted);
    transition: transform 0.25s, color 0.2s;
    flex-shrink: 0;
  }

  tr.team-row.expanded .caret {
    transform: rotate(90deg);
    color: var(--accent-gold);
  }

  tr.team-row.expanded td:first-child { color: var(--accent-gold); }

  /* YEAR DETAIL ROWS */
  table.main tbody tr.year-row {
    display: none;
    border-bottom: 1px solid rgba(28, 42, 72, 0.4);
    background: var(--bg-expanded);
    transition: background 0.12s;
  }

  table.main tbody tr.year-row.show { display: table-row; }
  table.main tbody tr.year-row:hover { background: var(--bg-expanded-hover); }

  table.main tbody tr.year-row td {
    padding: 8px 10px;
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    font-weight: 400;
    white-space: nowrap;
    color: var(--text-secondary);
  }

  table.main tbody tr.year-row td:first-child {
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    font-size: 0.76rem;
    letter-spacing: 0.3px;
    color: var(--text-muted);
    text-align: left;
    padding-left: 44px;
    background: inherit;
  }

  table.main tbody tr.year-row:hover td:first-child { background: var(--bg-expanded-hover); }

  td.total-cell { border-left: 2px solid var(--border-light); font-weight: 700 !important; }

  /* Repeater badge */
  .repeater-badge {
    font-family: 'Oswald', sans-serif;
    font-size: 0.55rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent-red);
    background: rgba(239,100,97,0.1);
    border: 1px solid rgba(239,100,97,0.25);
    padding: 1px 6px;
    border-radius: 3px;
    display: inline-block;
  }

  /* Amount colors */
  .amt-high { color: var(--high); }
  .amt-mid { color: var(--mid); }
  .amt-low { color: var(--low); }
  .amt-zero { color: var(--zero); }
  .amt-green { color: var(--accent-green); }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 100px 20px;
    gap: 18px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p {
    color: var(--text-secondary);
    font-family: 'Oswald', sans-serif;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-size: 0.78rem;
  }

  @media (max-width: 900px) {
    .section-row { flex-direction: column; }
    .page-header h1 { font-size: 1.8rem; letter-spacing: 3px; }
    .page-header { padding: 28px 16px 18px; }
  }

  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>

const YEAR_KEYS = ["'25/'26","'26/'27","'27/'28","'28/'29","'29/'30"];
const YEAR_MATCH = ['25/26','26/27','27/28','28/29','29/30'];

let bracketData = [];
let leagueTotals = [];
let teamMap = {};
let sortedTeams = [];
let expandedSet = new Set();
let currentSort = { col: 'taxspace0', dir: 'desc' };

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQ = false;
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { result.push(cur); cur = ''; }
      else cur += c;
    }
  }
  result.push(cur);
  return result;
}

function parseMoney(s) {
  if (!s) return 0;
  let c = s.replace(/[$,\s]/g, '');
  const neg = c.includes('(');
  c = c.replace(/[()]/g, '');
  if (c === '-' || c === '') return 0;
  const n = parseFloat(c);
  if (isNaN(n)) return 0;
  return neg ? -n : n;
}

function formatMoney(n) {
  if (n === 0) return '\u2014';
  const abs = Math.abs(n);
  if (n < 0) return '($' + abs.toLocaleString('en-US') + ')';
  return '$' + abs.toLocaleString('en-US');
}

function fmtPanel(n) {
  if (n === 0) return '\u2014';
  const abs = Math.abs(n);
  if (n < 0) return '($' + abs.toLocaleString('en-US') + ')';
  return '$' + abs.toLocaleString('en-US');
}

function taxSpaceClass(n) {
  if (n === 0) return 'amt-zero';
  if (n < 0) return 'amt-high';
  return 'amt-green';
}

function taxBillClass(n) {
  if (n === 0) return 'amt-zero';
  if (Math.abs(n) >= 50e6) return 'amt-high';
  if (Math.abs(n) >= 10e6) return 'amt-mid';
  return 'amt-low';
}

function bracketClass(n) {
  if (n === 0) return 'amt-zero';
  return 'amt-high';
}

function escKey(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function extractTeamName(label) {
  // "Atlanta Hawks '25/26" → "Atlanta Hawks"
  const m = label.match(/^(.+?)\s*'(\d\d)\/(\d\d)\s*$/);
  return m ? m[1].trim() : label.trim();
}

function extractYear(label) {
  const m = label.match(/'(\d\d)\/(\d\d)\s*$/);
  return m ? m[1] + '/' + m[2] : '';
}

function parseData(csv) {
  const lines = csv.split('\n').map(l => l.replace(/\r/,''));
  bracketData = [];
  leagueTotals = [];
  teamMap = {};

  // Parse header rows (rows 0-4 = bracket data, row 5 = column headers)
  for (let i = 0; i < 5; i++) {
    const cols = parseCSVLine(lines[i]);
    const yearLabel = (cols[2] || '').trim();
    const brackets = [];
    for (let b = 0; b < 11; b++) brackets.push(parseMoney(cols[3 + b]));

    // League totals from cols P-S (indices 15-18)
    const ltYear = (cols[15] || '').trim();
    const ltTotal = parseMoney(cols[16]);
    const ltNonTax = parseInt((cols[17] || '').replace(/\s/g,''), 10) || 0;
    const ltPerTeam = parseMoney(cols[18]);

    bracketData.push({ label: yearLabel, brackets });
    leagueTotals.push({ year: ltYear, total: ltTotal, nonTax: ltNonTax, perTeam: ltPerTeam });
  }

  // Row 5 has the last league totals row too
  const row5 = parseCSVLine(lines[5]);
  const lt5Year = (row5[15] || '').trim();
  const lt5Total = parseMoney(row5[16]);
  const lt5NonTax = parseInt((row5[17] || '').replace(/\s/g,''), 10) || 0;
  const lt5PerTeam = parseMoney(row5[18]);
  leagueTotals.push({ year: lt5Year, total: lt5Total, nonTax: lt5NonTax, perTeam: lt5PerTeam });

  // Parse team rows starting at line 6
  for (let i = 6; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = parseCSVLine(lines[i]);
    const label = (cols[0] || '').trim();
    if (!label || label.startsWith(',')) continue;

    const teamName = extractTeamName(label);
    const year = extractYear(label);
    if (!teamName || !year) continue;

    const taxSpace = parseMoney(cols[1]);
    const repeater = (cols[2] || '').trim().toLowerCase().includes('repeater');
    const brackets = [];
    for (let b = 0; b < 11; b++) brackets.push(parseMoney(cols[3 + b]));
    const total = parseMoney(cols[14]);

    if (!teamMap[teamName]) teamMap[teamName] = [];
    teamMap[teamName].push({ year, taxSpace, repeater, brackets, total, label });
  }

  applySorting();
}

function applySorting() {
  const teams = Object.keys(teamMap);
  const col = currentSort.col;
  const dir = currentSort.dir;

  if (col === 'team') {
    teams.sort((a,b) => dir === 'asc' ? a.localeCompare(b) : b.localeCompare(a));
  } else if (col === 'taxspace0') {
    teams.sort((a,b) => {
      const va = teamMap[a][0] ? teamMap[a][0].taxSpace : 0;
      const vb = teamMap[b][0] ? teamMap[b][0].taxSpace : 0;
      return dir === 'desc' ? vb - va : va - vb;
    });
  } else if (col === 'total0') {
    teams.sort((a,b) => {
      const va = teamMap[a][0] ? teamMap[a][0].total : 0;
      const vb = teamMap[b][0] ? teamMap[b][0].total : 0;
      return dir === 'desc' ? va - vb : vb - va; // more negative = bigger bill
    });
  }
  sortedTeams = teams;
}

function sortBy(col) {
  if (currentSort.col === col) {
    if (col === 'team') currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
    else currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
  } else {
    currentSort.col = col;
    currentSort.dir = col === 'team' ? 'asc' : 'desc';
  }
  applySorting();
  renderMain();
}

function renderPanels() {
  let html = '<div class="section-row">';

  // BRACKET REFERENCE
  html += '<div class="panel"><div class="panel-header">Tax Bracket Thresholds</div><div class="panel-overflow"><table><thead><tr><th>Year</th>';
  for (let b = 1; b <= 11; b++) html += '<th>B' + b + '</th>';
  html += '</tr></thead><tbody>';
  bracketData.forEach(r => {
    html += '<tr><td>' + escHtml(r.label) + '</td>';
    r.brackets.forEach(v => html += '<td>' + fmtPanel(v) + '</td>');
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';

  // LEAGUE TOTALS
  html += '<div class="panel" style="flex:0.6;min-width:340px"><div class="panel-header">League Totals</div><table><thead><tr><th>Year</th><th>Total Tax Paid</th><th># Non-Tax</th><th>Luxury Tax Distribution Per Team</th></tr></thead><tbody>';
  leagueTotals.forEach(r => {
    if (!r.year) return;
    html += '<tr><td>' + escHtml(r.year) + '</td>';
    html += '<td><span class="' + (r.total !== 0 ? 'amt-high' : 'amt-zero') + '">' + fmtPanel(r.total) + '</span></td>';
    html += '<td style="text-align:center">' + (r.nonTax || '\u2014') + '</td>';
    html += '<td><span class="' + (r.perTeam !== 0 ? 'amt-high' : 'amt-zero') + '">' + fmtPanel(r.perTeam) + '</span></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  html += '</div>';
  document.getElementById('panels').innerHTML = html;
}

function renderMain() {
  if (sortedTeams.length === 0) {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:80px;color:var(--accent-red)">No data found.</div>';
    return;
  }

  const thCols = [
    { key: 'team', label: 'Team / Year' },
    { key: 'taxspace0', label: 'Tax Space' },
    { key: 'repeater', label: 'Repeater?' },
  ];
  for (let b = 1; b <= 11; b++) thCols.push({ key: 'b'+b, label: 'B'+b });
  thCols.push({ key: 'total0', label: 'Total' });

  let html = '<div class="table-wrapper"><table class="main"><thead><tr>';
  thCols.forEach(c => {
    const active = currentSort.col === c.key ? ' sort-active' : '';
    const sortable = (c.key === 'team' || c.key === 'taxspace0' || c.key === 'total0');
    const isText = c.key === 'team';
    const arrow = currentSort.col === c.key
      ? (isText ? (currentSort.dir === 'asc' ? '\u25B2' : '\u25BC') : (currentSort.dir === 'desc' ? '\u25BC' : '\u25B2'))
      : '';
    const totalClass = c.key === 'total0' ? ' total-col' : '';
    const click = sortable ? ' onclick="sortBy(\'' + c.key + '\')"' : '';
    const style = sortable ? '' : ' style="cursor:default"';
    html += '<th class="' + active + totalClass + '"' + click + style + '>' + c.label;
    if (arrow) html += ' <span class="sort-arrow">' + arrow + '</span>';
    html += '</th>';
  });
  html += '</tr></thead><tbody>';

  sortedTeams.forEach(team => {
    const key = escKey(team);
    const years = teamMap[team];
    if (!years || years.length === 0) return;

    const first = years[0];

    // Team summary row (first year)
    html += '<tr class="team-row" data-team="' + key + '" onclick="toggleTeam(\'' + key + '\')">';
    html += '<td><div class="team-name-cell"><span class="caret">&#9654;</span> ' + escHtml(team) + ' <span style="color:var(--text-muted);font-size:0.7rem;font-weight:300">\'' + first.year + '</span></div></td>';
    html += '<td><span class="' + taxSpaceClass(first.taxSpace) + '">' + formatMoney(first.taxSpace) + '</span></td>';
    html += '<td style="text-align:center">' + (first.repeater ? '<span class="repeater-badge">Repeater</span>' : '\u2014') + '</td>';
    first.brackets.forEach(v => html += '<td><span class="' + bracketClass(v) + '">' + formatMoney(v) + '</span></td>');
    html += '<td class="total-cell"><span class="' + taxBillClass(first.total) + '">' + formatMoney(first.total) + '</span></td>';
    html += '</tr>';

    // Remaining year rows
    for (let y = 1; y < years.length; y++) {
      const yr = years[y];
      html += '<tr class="year-row" data-team="' + key + '">';
      html += '<td>\'' + yr.year + '</td>';
      html += '<td><span class="' + taxSpaceClass(yr.taxSpace) + '">' + formatMoney(yr.taxSpace) + '</span></td>';
      html += '<td style="text-align:center">' + (yr.repeater ? '<span class="repeater-badge">Repeater</span>' : '\u2014') + '</td>';
      yr.brackets.forEach(v => html += '<td><span class="' + bracketClass(v) + '">' + formatMoney(v) + '</span></td>');
      html += '<td class="total-cell"><span class="' + taxBillClass(yr.total) + '">' + formatMoney(yr.total) + '</span></td>';
      html += '</tr>';
    }
  });

  html += '</tbody></table></div>';
  document.getElementById('app').innerHTML = html;
  updateVisibility();
}

function toggleTeam(key) {
  if (expandedSet.has(key)) expandedSet.delete(key);
  else expandedSet.add(key);
  updateVisibility();
}

function expandAll() {
  sortedTeams.forEach(t => expandedSet.add(escKey(t)));
  updateVisibility();
}

function collapseAll() {
  expandedSet.clear();
  updateVisibility();
}

function updateVisibility() {
  document.querySelectorAll('tr.year-row').forEach(el => {
    el.classList.toggle('show', expandedSet.has(el.dataset.team));
  });
  document.querySelectorAll('tr.team-row').forEach(tr => {
    tr.classList.toggle('expanded', expandedSet.has(tr.dataset.team));
  });
}

function loadFallback() {
  try {
    const csv = atob(FALLBACK_B64);
    parseData(csv);
    renderPanels();
    renderMain();
  } catch(e) {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:80px;color:var(--accent-red)">Failed to load data.</div>';
  }
}

async function init() {
  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error();
    const text = await resp.text();
    parseData(text);
    renderPanels();
    renderMain();
  } catch(e) {
    loadFallback();
  }
}

init();
</script>
</body>
</html>
